<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Signature</title>
</head>

<body style="margin:40px;background:#ffffff;">

<table cellpadding="0" cellspacing="0" border="0" role="presentation"
       style="font-family:'Segoe UI',Helvetica,Arial,sans-serif;border-collapse:collapse;">
    <tr>

        <!-- Photo (background-crop keeps it circular even where object-fit is ignored) -->
        <td width="120" style="width:120px;padding-right:24px;vertical-align:middle;">
            <div style="width:120px;height:120px;border-radius:50%;overflow:hidden;border:2px solid #eef1f5;background-color:#eef1f5;background-image:url('https://tayyab-portfolio-chi.vercel.app/images/MTayyabSohail.jpeg');background-size:cover;background-position:center center;background-repeat:no-repeat;">
                <img
                    src="https://tayyab-portfolio-chi.vercel.app/images/MTayyabSohail.jpeg"
                    width="120"
                    height="120"
                    alt="Muhammad Tayyab Sohail"
                    style="display:block;width:120px;height:120px;border-radius:50%;object-fit:cover;object-position:center;opacity:0;">
            </div>
        </td>

        <!-- Accent divider -->
        <td width="2" style="width:2px;background:#2563eb;font-size:0;line-height:0;vertical-align:middle;">&nbsp;</td>

        <!-- Details -->
        <td style="padding-left:24px;vertical-align:middle;">

            <!-- Name -->
            <div style="font-size:22px;font-weight:700;color:#0f172a;letter-spacing:-0.4px;line-height:1.2;white-space:nowrap;padding-top:4px;">
                Muhammad Tayyab Sohail
            </div>

            <!-- Handwritten signature -->
            <img
                src="https://tayyab-portfolio-chi.vercel.app/images/sign.png"
                width="150"
                alt="Signature"
                style="display:block;width:150px;height:auto;margin-top:6px;margin-left:-6px;">

            <!-- Hairline -->
            <div style="height:1px;background:#e8ebf0;margin:12px 0;font-size:0;line-height:0;">&nbsp;</div>

            <!-- Row 2: social chips -->
            <table cellpadding="0" cellspacing="0" border="0" role="presentation">
                <tr>
                    <td style="padding-right:8px;">
                        <a href="https://tayyab-portfolio-chi.vercel.app" title="Portfolio" style="text-decoration:none;">
                            <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border:1px solid #e5e9ef;border-radius:9px;">
                                <tr><td width="36" height="36" align="center" valign="middle" style="width:36px;height:36px;">
                                    <img src="https://tayyab-portfolio-chi.vercel.app/icons/portfolio.svg" width="18" height="18" alt="Portfolio" style="display:block;">
                                </td></tr>
                            </table>
                        </a>
                    </td>
                    <td style="padding-right:8px;">
                        <a href="https://www.linkedin.com/in/muhammad-tayyab-sohail" title="LinkedIn" style="text-decoration:none;">
                            <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border:1px solid #e5e9ef;border-radius:9px;">
                                <tr><td width="36" height="36" align="center" valign="middle" style="width:36px;height:36px;">
                                    <img src="https://tayyab-portfolio-chi.vercel.app/icons/linkedin.svg" width="18" height="18" alt="LinkedIn" style="display:block;">
                                </td></tr>
                            </table>
                        </a>
                    </td>
                    <td style="padding-right:8px;">
                        <a href="https://github.com/TayyabSohail" title="GitHub" style="text-decoration:none;">
                            <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border:1px solid #e5e9ef;border-radius:9px;">
                                <tr><td width="36" height="36" align="center" valign="middle" style="width:36px;height:36px;">
                                    <img src="https://tayyab-portfolio-chi.vercel.app/icons/github.svg" width="18" height="18" alt="GitHub" style="display:block;">
                                </td></tr>
                            </table>
                        </a>
                    </td>
                    <td>
                        <a href="https://wa.me/923338199915" title="WhatsApp" style="text-decoration:none;">
                            <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border:1px solid #e5e9ef;border-radius:9px;">
                                <tr><td width="36" height="36" align="center" valign="middle" style="width:36px;height:36px;">
                                    <img src="https://tayyab-portfolio-chi.vercel.app/icons/whatsapp.svg" width="18" height="18" alt="WhatsApp" style="display:block;">
                                </td></tr>
                            </table>
                        </a>
                    </td>
                </tr>
            </table>

        </td>

    </tr>
</table>

</body>
</html>
